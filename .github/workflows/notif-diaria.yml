name: Notificacao Diaria

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  enviar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enviar notificacao
        env:
          RESEND_KEY: ${{ secrets.RESEND_KEY }}
        run: node scripts/notif-diaria.js
